x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "${DOCKER_LOG_MAX_SIZE:-10m}"
    max-file: "${DOCKER_LOG_MAX_FILE:-5}"

services:
  postgres:
    image: postgres:16
    container_name: mdp-postgres
    restart: unless-stopped
    command: ["postgres", "-p", "6543"]
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "6543:6543"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./infra/db/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB} -p ${POSTGRES_PORT}"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging: *default-logging

  auth-service:
    build: ./services/auth-service
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "3001:3001"
    logging: *default-logging

  user-service:
    build: ./services/user-service
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "3002:3002"
    logging: *default-logging

  project-service:
    build: ./services/project-service
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "3003:3003"
    logging: *default-logging

  attendance-service:
    build: ./services/attendance-service
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "3004:3004"
    logging: *default-logging

  notification-service:
    build: ./services/notification-service
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "3005:3005"
    logging: *default-logging

  gateway:
    build: ./gateway
    env_file: .env
    depends_on:
      - auth-service
      - user-service
      - project-service
      - attendance-service
      - notification-service
    ports:
      - "8080:8080"
    logging: *default-logging

  frontend:
    build: ./frontend
    env_file: .env
    depends_on:
      - gateway
    ports:
      - "5173:5173"
    logging: *default-logging

volumes:
  pgdata:
